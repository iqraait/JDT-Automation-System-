<script src="https://cdn.tailwindcss.com"></script>

<div class="h-screen flex items-center justify-center bg-gradient-to-r from-blue-500 to-purple-500">

<div class="bg-white/20 backdrop-blur-lg p-8 rounded-2xl shadow-xl w-80">

<h2 class="text-white text-xl mb-4 text-center">Register</h2>

<form method="POST">
{% csrf_token %}

<input name="username" placeholder="Username" class="w-full p-2 mb-3 rounded">
<input type="password" name="password" placeholder="Password" class="w-full p-2 mb-3 rounded">

<button class="w-full bg-white text-blue-600 py-2 rounded">Register</button>

</form>

</div>

</div>
