{% extends "base.html" %}

{% block title %}Set New Password | Student Portal{% endblock %}

{% block body_content %}
<div class="min-h-screen flex items-center justify-center bg-slate-50 relative overflow-hidden px-4">
    
    <!-- BACKGROUND ACCENTS -->
    <div class="absolute top-0 right-0 w-96 h-96 bg-blue-100 rounded-full blur-[100px] translate-x-1/2 -translate-y-1/2 opacity-60"></div>
    <div class="absolute bottom-0 left-0 w-[500px] h-[500px] bg-indigo-100 rounded-full blur-[120px] -translate-x-1/3 translate-y-1/3 opacity-40"></div>

    <!-- CARD -->
    <div class="w-full max-w-md relative z-10">
        
        <div class="text-center mb-8">
            <div class="inline-flex items-center justify-center w-16 h-16 bg-blue-600 rounded-2xl shadow-xl shadow-blue-200 mb-4 border border-blue-500">
                <svg class="w-8 h-8 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 7a2 2 0 012 2m4 0a6 6 0 01-7.743 5.743L11 17H9v2H7v2H4a1 1 0 01-1-1v-2.586a1 1 0 01.293-.707l5.964-5.964A6 6 0 1121 9z"></path></svg>
            </div>
            <h1 class="text-3xl font-black text-slate-800 tracking-tight">New Password</h1>
            <p class="text-slate-500 font-medium">Create a strong password for your account</p>
        </div>

        <div class="bg-white/80 backdrop-blur-xl p-10 rounded-[2.5rem] shadow-2xl shadow-slate-200/60 border border-white">
            
            <form method="POST" class="space-y-6">
                {% csrf_token %}

                <div class="space-y-2">
                    <label class="text-xs font-bold text-slate-400 border-l-4 border-blue-500 pl-3 uppercase tracking-widest ml-1">New Password</label>
                    <div class="relative group">
                        <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
                            <svg class="h-5 w-5 text-slate-300 group-focus-within:text-blue-500 transition-colors" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"></path></svg>
                        </div>
                        <input name="password" type="password" placeholder="••••••••" required
                               class="w-full bg-slate-100 border-none px-12 py-4 rounded-2xl focus:ring-4 focus:ring-blue-600/10 focus:bg-white transition-all outline-none font-medium text-slate-700">
                    </div>
                </div>

                <div class="space-y-2">
                    <label class="text-xs font-bold text-slate-400 border-l-4 border-slate-200 pl-3 uppercase tracking-widest ml-1">Confirm Password</label>
                    <div class="relative group">
                        <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
                            <svg class="h-5 w-5 text-slate-300 group-focus-within:text-blue-500 transition-colors" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"></path></svg>
                        </div>
                        <input name="confirm_password" type="password" placeholder="••••••••" required
                               class="w-full bg-slate-100 border-none px-12 py-4 rounded-2xl focus:ring-4 focus:ring-blue-600/10 focus:bg-white transition-all outline-none font-medium text-slate-700">
                    </div>
                </div>

                <button class="w-full bg-blue-600 hover:bg-blue-700 text-white py-4 rounded-2xl font-bold shadow-xl shadow-blue-200 transition-all transform hover:scale-[1.02] active:scale-95 flex items-center justify-center gap-2 group">
                    <span>Update Password</span>
                    <svg class="w-5 h-5 group-hover:translate-x-1 transition-transform" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"></path></svg>
                </button>
            </form>

            <div class="mt-8 pt-8 border-t border-slate-100 text-center">
                <a href="/accounts/login/" class="text-slate-400 text-sm font-bold hover:text-slate-600 transition-colors uppercase tracking-widest">Cancel</a>
            </div>
        </div>
    </div>
</div>

<script>
document.querySelector('form').addEventListener('submit', function(e) {
    const p1 = document.querySelector('input[name="password"]').value;
    const p2 = document.querySelector('input[name="confirm_password"]').value;
    if (p1 !== p2) {
        e.preventDefault();
        alert("Passwords do not match!");
    }
});
</script>
{% endblock %}
